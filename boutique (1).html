<!DOCTYPE html>
<html lang="fr">
<head>
  <title>Boutique en ligne</title>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background-color: #DDDDDD;
  font-family: sans-serif;
  padding: 16px;
}
h1 {
  text-align: center;
  background-color: white;
  color: rgb(60,60,60);
  padding: 10px;
  border-radius: 4px;
  width: 100%;
  box-shadow: 0px 0px 2px 2px rgba(80,64,64,0.5);
  margin-bottom: 12px;
}
#wrapper {
  display: flex;
  gap: 12px;
  width: 100%;
}
div#boutique {
  flex: 1;
  background-color: white;
  border-radius: 4px;
  box-shadow: 0px 0px 2px 2px rgba(80,64,64,0.5);
  padding: 6px;
  height: 580px;
  overflow-y: auto;
}
div#panier {
  width: 240px;
  flex-shrink: 0;
  background-color: #f0f8f0;
  border-radius: 4px;
  box-shadow: 0px 0px 2px 2px rgba(80,64,64,0.5);
  padding: 6px;
  height: 580px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
input#filter {
  width: 100%;
  padding: 6px;
  border: 1px solid #ccc;
  border-radius: 4px;
}
#total {
  background-color: rgb(200,0,0);
  color: white;
  border-radius: 4px;
  padding: 6px;
  text-align: center;
  font-size: 14px;
}
#montant:after { content: " €" }
div.achats {
  flex: 1;
  overflow-y: auto;
  border: solid thin rgba(80,64,64,0.5);
  border-radius: 4px;
  padding: 2px;
}

/* Grille produits */
.produits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 8px;
}
div.produit {
  position: relative;
  text-align: center;
  background-color: white;
  box-shadow: 0px 0px 6px 2px rgba(100,255,150,0.8) inset;
  border-radius: 4px;
  padding: 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
div.produit h4 {
  color: rgb(60,60,60);
  font-size: 12px;
  text-align: left;
  width: 100%;
}
div.produit figure {
  width: 100%;
  height: 110px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0px 0px 4px 2px rgba(150,255,200,0.75) inset;
  border-radius: 4px;
}
div.produit figure img {
  max-height: 100%;
  max-width: 100%;
  object-fit: contain;
}
div.produit div.prix {
  position: absolute;
  top: 30px;
  right: 8px;
  font-size: 13px;
  background-color: rgb(200,0,0);
  color: white;
  padding: 3px 5px;
  border-radius: 4px;
}
div.prix:after { content: " €" }

div.controle {
  display: flex;
  align-items: center;
  gap: 4px;
  background-color: rgba(0,150,0,0.1);
  box-shadow: 0px 0px 2px 1px rgba(0,150,0,0.3) inset;
  border-radius: 4px;
  padding: 4px 6px;
}
input[type="number"] {
  width: 38px;
  font-size: 14px;
  text-align: center;
  border: none;
  background-color: rgb(250,250,250);
  border-radius: 2px;
}

const MAX_QTY = 9;
let total = 0;

const init = function () {
  createShop();
  document.getElementById("filter").addEventListener("keyup", filterProducts);
};

const createShop = function () {
  const grid = document.getElementById("grid");
  for (let i = 0; i < catalog.length; i++) {
    grid.appendChild(createProduct(catalog[i], i));
  }
};

const createProduct = function (product, index) {
  const div = document.createElement("div");
  div.className = "produit";
  div.id = index + "-product";

  const h4 = document.createElement("h4");
  h4.textContent = product.name;
  div.appendChild(h4);

  const figure = document.createElement("figure");
  const img = document.createElement("img");
  img.src = product.image;
  img.alt = product.name;
  figure.appendChild(img);
  div.appendChild(figure);

  const prix = document.createElement("div");
  prix.className = "prix";
  prix.textContent = product.price;
  div.appendChild(prix);

  const ctrl = document.createElement("div");
  ctrl.className = "controle";

  const input = document.createElement("input");
  input.id = index + "-qte";
  input.type = "number";
  input.value = "0";
  input.min = "0";
  input.max = MAX_QTY.toString();
  input.addEventListener("change", verifQuantity);
  ctrl.appendChild(input);

  const btn = document.createElement("button");
  btn.className = "commander";
  btn.id = index + "-order";
  btn.disabled = true;
  btn.addEventListener("click", orderProduct);
  ctrl.appendChild(btn);

  div.appendChild(ctrl);
  return div;
};

const verifQuantity = function () {
  const index = this.id.replace("-qte", "");
  let qty = parseInt(this.value);
  if (isNaN(qty) || qty < 0) qty = 0;
  if (qty > MAX_QTY) qty = MAX_QTY;
  this.value = qty;
  const btn = document.getElementById(index + "-order");
  btn.style.opacity = qty === 0 ? "0.25" : "1";
  btn.disabled = qty === 0;
};

const orderProduct = function () {
  const idx = parseInt(this.id);
  const qteInput = document.getElementById(idx + "-qte");
  const qty = parseInt(qteInput.value);
  if (qty > 0) {
    addToCart(idx, qty);
    qteInput.value = "0";
    this.style.opacity = "0.25";
    this.disabled = true;
  }
};

const addToCart = function (index, qty) {
  const product = catalog[index];
  const existing = document.getElementById(index + "-achat");
  if (existing) {
    const qteSpan = existing.querySelector(".quantite");
    const newQty = Math.min(parseInt(qteSpan.textContent) + qty, MAX_QTY);
    const diff = newQty - parseInt(qteSpan.textContent);
    qteSpan.textContent = newQty;
    total += diff * product.price;
  } else {
    const div = document.createElement("div");
    div.className = "achat";
    div.id = index + "-achat";

    const fig = document.createElement("figure");
    const img = document.createElement("img");
    img.src = product.image;
    fig.appendChild(img);
    div.appendChild(fig);

    const nom = document.createElement("h4");
    nom.textContent = product.name;
    div.appendChild(nom);

    const qte = document.createElement("span");
    qte.className = "quantite";
    qte.textContent = qty;
    div.appendChild(qte);

    const pr = document.createElement("span");
    pr.className = "prix";
    pr.textContent = product.price;
    div.appendChild(pr);

    const btn = document.createElement("button");
    btn.className = "retirer";
    btn.id = index + "-suppr";
    btn.addEventListener("click", removeFromCart);
    div.appendChild(btn);

    document.querySelector(".achats").appendChild(div);
    total += qty * product.price;
  }
  document.getElementById("montant").textContent = total;
};

const removeFromCart = function () {
  const index = parseInt(this.id);
  const div = document.getElementById(index + "-achat");
  const qty = parseInt(div.querySelector(".quantite").textContent);
  total -= qty * catalog[index].price;
  div.remove();
  document.getElementById("montant").textContent = total;
};

const filterProducts = function () {
  const val = document.getElementById("filter").value.toLowerCase();
  for (let i = 0; i < catalog.length; i++) {
    const div = document.getElementById(i + "-product");
    div.style.display = catalog[i].name.toLowerCase().includes(val) ? "" : "none";
  }
};

document.addEventListener("DOMContentLoaded", init);
</script>
