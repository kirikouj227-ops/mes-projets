<!DOCTYPE html>
<html lang="fr">
<head>
  <title>Boutique en ligne</title>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
body {
  background-color: #DDDDDD;
  width: 100%;
  font-family: sans-serif;
  padding-left: 20px;
}
h1 {
  text-align: center;
  background-color: white;
  color: rgb(60,60,60);
  padding: 5px;
  border-radius: 4px;
  width: 805px;
  box-shadow: 0px 0px 2px 2px rgba(80,64,64,0.5);
}
div#panier, div#boutique {
  background-color: white;
  display: inline-block;
  vertical-align: middle;
  height: 550px;
}
div#boutique { width: 566px; }
div.achats, div#boutique { overflow: auto; }
div#panier, div#boutique {
  box-shadow: 0px 0px 2px 2px rgba(80,64,64,0.5);
  padding: 2px;
  border-radius: 4px;
}
div.achats {
  height: 480px;
  border: solid thin rgba(80,64,64,0.5);
  padding: 2px;
  border-radius: 4px;
}
div#panier {
  width: 250px;
  text-align: center;
  background-color: #f0f8f0;
}
input#filter { width: 95%; padding: 5px; }
div.produit {
  width: 32.5%;
  position: relative;
  text-align: center;
  height: 240px;
  display: inline-block;
  background-color: rgba(255,255,255,0);
  box-shadow: 0px 0px 6px 2px rgba(100,255,150,0.8) inset;
  border-radius: 4px;
  margin: 2px 2px;
}
div.produit figure, div.produit div.description {
  box-shadow: 0px 0px 4px 2px rgba(150,255,200,0.75) inset;
  border-radius: 4px;
}
div.produit figure {
  margin: auto;
  width: 90%;
  height: 120px;
  text-align: center;
}
div.produit figure img { margin: 5px; height: 93%; }
div.produit h4 {
  color: rgb(60,60,60);
  text-align: left;
  font-size: 12px;
  margin: 0px;
  padding: 5px 10px;
}
div.produit div.description, div.controle {
  vertical-align: middle;
  display: inline-block;
}
div.produit div.description {
  height: 78px;
  width: 108px;
  text-align: left;
  font-size: 10px;
  background-color: white;
  margin: 2px 4px 2px 2px;
  padding: 4px 6px;
}
div.produit div.prix {
  position: absolute;
  top: 35px;
  right: 15px;
  font-size: 14px;
  display: inline-block;
  background-color: rgb(200,0,0);
  color: white;
  padding: 4px;
  border-radius: 4px;
}
div.prix:after, #montant:after { content: " €" }
button.commander {
  width: 25px;
  height: 25px;
  background-size: cover;
  border: solid 2px white;
  opacity: 0.25;
  background-image: url("style/images/panier.jpg");
}
button.retirer {
  width: 19px;
  height: 19px;
  background-size: cover;
  border: solid 2px white;
  box-shadow: 0px 0px 2px 1px rgba(200,0,0,0.6);
  background-image: url("style/images/poubelle.jpg");
}
input[type="number"] {
  width: 34px;
  font-size: 14px;
  text-align: center;
  border: none;
  background-color: rgb(250,250,250);
}
.produit div.controle {
  box-shadow: 0px 0px 2px 1px rgba(0,150,0,0.3) inset;
  background-color: rgba(0,150,0,0.1);
  text-align: center;
  border-radius: 4px;
}
div.produit div.controle { width: 42px; }
div.achat div.controle { width: 22px; }
div.controle button, div.controle input {
  display: block;
  margin: 7px auto;
  border-radius: 2px;
}
.achat {
  height: 32px;
  width: 97%;
  text-align: left;
  box-shadow: 0px 0px 4px 2px rgba(100,255,150,0.8) inset;
  padding: 3px;
  margin: 2px 1px;
}
.achat * {
  display: inline-block;
  margin: 0px;
  vertical-align: middle;
  text-align: left;
}
.achat h4 {
  vertical-align: top;
  font-size: 10px;
  width: 49%;
  height: 80%;
  padding: 0px 2px;
  font-weight: normal;
  overflow: hidden;
  text-overflow: ellipsis;
  color: #888888;
  margin: 0px 2px;
}
.achat figure { width: 32px; }
.achat figure img { width: 100%; }
.achat .prix, .achat .quantite { font-size: 12px; }
.achat .prix { margin-right: 4px; }
.achat .quantite:after { content: "x"; margin-right: 2px; }
#total {
  background-color: rgb(200,0,0);
  color: white;
  border-radius: 4px;
  margin: 4px 2px;
  padding: 2px;
}
  </style>
</head>
<body>
  <h1>Ma boutique en ligne</h1>
  <div id="boutique"></div>
  <div id="panier">
    <input id="filter" placeholder="rechercher des produits..."/>
    <div id="total">Total du panier&nbsp;: <span id="montant">0</span></div>
    <div class="achats"></div>
  </div>

<script>
const catalog = [
  { name:"Nounours marron", description:"un joli nounours marron avec un foulard", image:"images/nounours1.jpg", price:35, qty:5 },
  { name:"Nounours blanc", description:"un ours blanc tout doux", image:"images/nounours2.jpg", price:42, qty:5 },
  { name:"Peluche Ane gris", description:"joli petit ane gris", image:"images/ane.jpg", price:15, qty:5 },
  { name:"Pokemon Bulbizarre", description:"Pokemon Bulbizarre", image:"images/bulbizarre.jpg", price:25, qty:5 },
  { name:"Cochon rose", description:"un petit cochon rose tout frippé", image:"images/cochon.jpg", price:35, qty:5 },
  { name:"Donkey Kong", description:"Le célèbre Donkey Kong", image:"images/donkekong.jpg", price:25, qty:5 },
  { name:"Girafe", description:"Petite girafe assise", image:"images/girafe.jpg", price:23, qty:5 },
  { name:"Peluche Hibou", description:"Un hibou tout en plume.", image:"images/hibou.jpg", price:22, qty:5 },
  { name:"Link", description:"Link le héros de la série Zelda.", image:"images/link.jpg", price:25, qty:5 },
  { name:"Nounours crème", description:"Il est pas migon avec ses grosses papattes ?", image:"images/nounours3.jpg", price:35, qty:5 },
  { name:"Panda", description:"Un bon gros panda joufflu", image:"images/panda.jpg", price:35, qty:5 },
  { name:"Pokemon Pikachu", description:"Le plus célèbre des pokemons.", image:"images/pikachu.jpg", price:25, qty:5 },
  { name:"Peluche Poule", description:"Une idée originale de peluche", image:"images/poule.jpg", price:27, qty:5 },
  { name:"Renard", description:"Un renard très sympathique.", image:"images/renard.jpg", price:45, qty:5 },
  { name:"Pokemon Riolu", description:"Pokemon Riolu", image:"images/riolu.jpg", price:25, qty:5 },
  { name:"Pokemon Salameche", description:"Pokemon Salameche", image:"images/salameche.jpg", price:25, qty:5 }
];

const MAX_QTY = 9;
const cart = [];
let total = 0;

const init = function () {
  createShop();
  updateTotal();
  document.getElementById("filter").addEventListener("keyup", filterDisplaidProducts);
};

const createShop = function () {
  const shop = document.getElementById("boutique");
  for (let i = 0; i < catalog.length; i++) {
    shop.appendChild(createProduct(catalog[i], i));
  }
};

const createProduct = function (product, index) {
  const divProd = document.createElement("div");
  divProd.className = "produit";
  divProd.id = index + "-product";
  divProd.appendChild(createBlock("h4", product.name));
  divProd.appendChild(createFigureBlock(product));
  divProd.appendChild(createBlock("div", product.description, "description"));
  divProd.appendChild(createBlock("div", product.price, "prix"));
  divProd.appendChild(createOrderControlBlock(index));
  return divProd;
};

const createBlock = function (tag, content, cssClass) {
  const element = document.createElement(tag);
  if (cssClass != undefined) element.className = cssClass;
  element.innerHTML = content;
  return element;
};

const updateTotal = function () {
  document.getElementById("montant").textContent = total;
};

const createFigureBlock = function (product) {
  const figure = document.createElement("figure");
  const img = document.createElement("img");
  img.src = product.image;
  img.alt = product.name;
  figure.appendChild(img);
  const figcaption = document.createElement("figcaption");
  figcaption.textContent = product.price + " €";
  figure.appendChild(figcaption);
  return figure;
};

const createOrderControlBlock = function (index) {
  const control = document.createElement("div");
  control.className = "controle";
  const input = document.createElement("input");
  input.id = index + "-qte";
  input.type = "number";
  input.step = "1";
  input.value = "0";
  input.min = "0";
  input.max = MAX_QTY.toString();
  input.addEventListener("change", verifQuantity);
  control.appendChild(input);
  const button = document.createElement("button");
  button.className = "commander";
  button.id = index + "-order";
  button.style.opacity = "0.25";
  button.disabled = true;
  button.addEventListener("click", orderProduct);
  control.appendChild(button);
  return control;
};

const verifQuantity = function () {
  const index = this.id.replace("-qte", "");
  let qty = parseInt(this.value);
  if (isNaN(qty) || qty < 0) qty = 0;
  if (qty > MAX_QTY) qty = MAX_QTY;
  this.value = qty;
  const button = document.getElementById(index + "-order");
  if (qty === 0) { button.style.opacity = "0.25"; button.disabled = true; }
  else { button.style.opacity = "1"; button.disabled = false; }
};

const orderProduct = function () {
  const idx = parseInt(this.id);
  const qteInput = document.getElementById(idx + "-qte");
  const qty = parseInt(qteInput.value);
  if (qty > 0) {
    addProductToCart(idx, qty);
    qteInput.value = "0";
    this.style.opacity = "0.25";
    this.disabled = true;
  }
};

const addProductToCart = function (index, qty) {
  const product = catalog[index];
  const existingAchat = document.getElementById(index + "-achat");
  if (existingAchat) {
    const qteSpan = existingAchat.querySelector(".quantite");
    let currentQty = parseInt(qteSpan.textContent);
    const newQty = Math.min(currentQty + qty, MAX_QTY);
    const diff = newQty - currentQty;
    qteSpan.textContent = newQty;
    total += diff * product.price;
  } else {
    const divAchat = document.createElement("div");
    divAchat.className = "achat";
    divAchat.id = index + "-achat";
    const figure = document.createElement("figure");
    const img = document.createElement("img");
    img.src = product.image;
    img.alt = product.name;
    figure.appendChild(img);
    divAchat.appendChild(figure);
    const nom = document.createElement("h4");
    nom.textContent = product.name;
    divAchat.appendChild(nom);
    const qteSpan = document.createElement("span");
    qteSpan.className = "quantite";
    qteSpan.textContent = qty;
    divAchat.appendChild(qteSpan);
    const prix = document.createElement("span");
    prix.className = "prix";
    prix.textContent = product.price + " €";
    divAchat.appendChild(prix);
    const btnSuppr = document.createElement("button");
    btnSuppr.className = "retirer";
    btnSuppr.id = index + "-suppr";
    btnSuppr.addEventListener("click", removeFromCart);
    divAchat.appendChild(btnSuppr);
    document.querySelector(".achats").appendChild(divAchat);
    total += qty * product.price;
  }
  updateTotal();
};

const removeFromCart = function () {
  const index = parseInt(this.id);
  const product = catalog[index];
  const divAchat = document.getElementById(index + "-achat");
  const qty = parseInt(divAchat.querySelector(".quantite").textContent);
  total -= qty * product.price;
  divAchat.remove();
  updateTotal();
};

const filterDisplaidProducts = function () {
  const filterValue = document.getElementById("filter").value.toLowerCase();
  for (let i = 0; i < catalog.length; i++) {
    const divProd = document.getElementById(i + "-product");
    if (catalog[i].name.toLowerCase().indexOf(filterValue) !== -1) {
      divProd.style.display = "";
    } else {
      divProd.style.display = "none";
    }
  }
};

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
